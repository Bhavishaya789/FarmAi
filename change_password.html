<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmAI | Change Password</title>
    <link rel="icon" type="image/png" href="logo/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans','sans-serif'], display: ['Outfit','sans-serif'] }, colors: { brand: { 500: '#10b981', 600: '#059669' }, deep: '#020617' } } }
        }
    </script>
    <style>
        body { background-color: #020617; }
        .input-field { background: rgba(30,41,59,0.4); border: 1px solid rgba(148,163,184,0.1); transition: all 0.3s; }
        .input-field:focus { border-color: #10b981; box-shadow: 0 0 0 4px rgba(16,185,129,0.1); }
        .strength-bar { height: 4px; border-radius: 2px; transition: all 0.3s; }
        @keyframes fadeIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="text-slate-200 min-h-screen font-sans flex items-center justify-center p-6">
    <div class="w-full max-w-md animate-fadeIn">
        <div class="text-center mb-10">
            <div class="w-16 h-16 rounded-2xl bg-brand-500/10 border border-brand-500/20 flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-shield-halved text-brand-500 text-2xl"></i>
            </div>
            <h1 class="font-display text-3xl font-bold text-white mb-2">Change Password</h1>
            <p class="text-slate-500 text-sm">Keep your account secure</p>
        </div>

        <div class="bg-slate-900/60 border border-slate-800 rounded-3xl p-8">
            <form id="changePasswordForm" class="space-y-5">

                <!-- Current Password -->
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-widest text-slate-500">Current Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-600"></i>
                        <input type="password" id="currentPassword" required
                            class="input-field w-full pl-11 pr-12 py-4 rounded-2xl text-white outline-none" placeholder="••••••••">
                        <button type="button" onclick="togglePass('currentPassword',this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="h-px bg-white/5"></div>

                <!-- New Password -->
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-widest text-slate-500">New Password</label>
                    <div class="relative">
                        <i class="fas fa-key absolute left-4 top-1/2 -translate-y-1/2 text-brand-500/50"></i>
                        <input type="password" id="newPassword" required
                            class="input-field w-full pl-11 pr-12 py-4 rounded-2xl text-white outline-none"
                            placeholder="••••••••" oninput="checkStrength(this.value)">
                        <button type="button" onclick="togglePass('newPassword',this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <!-- Strength meter -->
                    <div class="space-y-1 px-1">
                        <div class="flex gap-1">
                            <div id="s1" class="strength-bar flex-1 bg-slate-700"></div>
                            <div id="s2" class="strength-bar flex-1 bg-slate-700"></div>
                            <div id="s3" class="strength-bar flex-1 bg-slate-700"></div>
                            <div id="s4" class="strength-bar flex-1 bg-slate-700"></div>
                        </div>
                        <p id="strengthLabel" class="text-xs"></p>
                        <p id="strengthTip" class="text-xs text-slate-600 italic leading-relaxed"></p>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-widest text-slate-500">Confirm New Password</label>
                    <div class="relative">
                        <i class="fas fa-check-double absolute left-4 top-1/2 -translate-y-1/2 text-slate-600"></i>
                        <input type="password" id="confirmNewPassword" required
                            class="input-field w-full pl-11 pr-12 py-4 rounded-2xl text-white outline-none" placeholder="••••••••">
                        <button type="button" onclick="togglePass('confirmNewPassword',this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit"
                    class="w-full bg-gradient-to-r from-brand-500 to-brand-600 py-4 mt-2 rounded-2xl text-white font-bold tracking-wide text-lg shadow-xl shadow-brand-500/20 transition-all hover:-translate-y-0.5 flex items-center justify-center gap-3">
                    <span>Update Password</span>
                    <i class="fas fa-shield-halved text-sm opacity-70"></i>
                </button>
            </form>
        </div>

        <div class="mt-8 text-center">
            <a href="/profile-page" class="text-xs font-bold text-slate-500 hover:text-white transition-colors uppercase tracking-widest">
                <i class="fas fa-chevron-left mr-2"></i> Return to Profile
            </a>
        </div>
    </div>

    <script>
        function togglePass(id, btn) {
            const input = document.getElementById(id);
            const isPass = input.type === 'password';
            input.type = isPass ? 'text' : 'password';
            btn.innerHTML = `<i class="fas fa-eye${isPass ? '-slash' : ''}"></i>`;
        }

        function generateStrongPassword() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$%';
            return Array.from({length: 14}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
        }

        function checkStrength(val) {
            const bars  = ['s1','s2','s3','s4'].map(id => document.getElementById(id));
            const label = document.getElementById('strengthLabel');
            const tip   = document.getElementById('strengthTip');
            bars.forEach(b => b.style.backgroundColor = '#334155');
            if (!val) { label.textContent = ''; tip.textContent = ''; return; }

            let score = 0, tips = [];
            if (val.length >= 8)          score++; else tips.push('8+ characters');
            if (/[A-Z]/.test(val))        score++; else tips.push('uppercase letter');
            if (/[0-9]/.test(val))        score++; else tips.push('a number');
            if (/[^A-Za-z0-9]/.test(val)) score++; else tips.push('special char (!@#$)');

            const colors = ['#ef4444','#f97316','#eab308','#10b981'];
            const labels = ['Weak','Fair','Good','Strong'];
            for (let i = 0; i < score; i++) bars[i].style.backgroundColor = colors[score - 1];
            label.textContent = labels[score - 1] || '';
            label.style.color = colors[score - 1] || '#64748b';

            if (tips.length > 0) {
                tip.textContent = `Needs: ${tips.join(', ')}. Suggested: ${generateStrongPassword()}`;
            } else {
                tip.textContent = '✓ Strong password!';
                tip.style.color = '#10b981';
            }
        }

        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newP  = document.getElementById('newPassword').value;
            const confP = document.getElementById('confirmNewPassword').value;
            if (newP !== confP) { showToast('Passwords do not match!', 'error'); return; }
            if (newP.length < 8) { showToast('Password must be at least 8 characters', 'error'); return; }

            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!user.username) { window.location.href = '/login-page'; return; }

            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Updating...';

            try {
                const res = await fetch('/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: user.username,
                        current_password: document.getElementById('currentPassword').value,
                        new_password: newP
                    })
                });
                if (res.ok) {
                    showToast('Password updated successfully!', 'success');
                    setTimeout(() => window.location.href = '/profile-page', 1500);
                } else {
                    const data = await res.json();
                    showToast(data.detail || 'Update failed', 'error');
                }
            } catch { showToast('Server unreachable', 'error'); }
            finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Update Password</span><i class="fas fa-shield-halved text-sm opacity-70"></i>';
            }
        });

        function showToast(msg, type = 'success') {
            const div = document.createElement('div');
            const c = type === 'success' ? 'bg-brand-500/10 border-brand-500/20 text-brand-500' : 'bg-red-500/10 border-red-500/20 text-red-400';
            div.className = `fixed top-6 right-6 ${c} border px-6 py-4 rounded-xl backdrop-blur-md shadow-2xl z-50`;
            div.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':'exclamation-circle'} mr-2"></i>${msg}`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }
    </script>
</body>
</html>
